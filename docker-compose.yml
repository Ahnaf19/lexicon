services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lexicon
      POSTGRES_USER: lexicon
      POSTGRES_PASSWORD: lexicon
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "lexicon", "-d", "lexicon"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  langfuse-db:
    image: postgres:16-alpine
    profiles: ["obs"]
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:latest
    profiles: ["obs"]
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: secret
      SALT: salt

  api:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app

  streamlit:
    build: .
    command: streamlit run ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - .:/app

volumes:
  pgdata:
  ollama:
  langfuse-pgdata:
